<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordWise – Englisch lernen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== SCREEN 1: HOME ===== -->
  <div id="screen-home" class="screen active">
    <header>
      <h1>WordWise</h1>
      <p class="subtitle">Englisch lernen – Schritt für Schritt</p>
    </header>

    <main>
      <h2>Wähle ein Thema</h2>
      <div id="topic-list" class="card-grid"></div>
    </main>
  </div>

  <!-- ===== SCREEN 2: MODE SELECTION ===== -->
  <div id="screen-mode" class="screen">
    <header>
      <button class="back-btn" onclick="showScreen('home')">← Zurück</button>
      <h1 id="mode-topic-title"></h1>
    </header>

    <main>
      <h2>Was möchtest du üben?</h2>
      <div class="mode-grid">
        <button class="mode-card" onclick="startMode('flashcards')">
          <span class="mode-icon">🃏</span>
          <span class="mode-name">Karteikarten</span>
          <span class="mode-desc">Vokabeln Deutsch → Englisch</span>
        </button>
        <button class="mode-card" onclick="startMode('sentences')">
          <span class="mode-icon">🔀</span>
          <span class="mode-name">Sätze zusammensetzen</span>
          <span class="mode-desc">Wörter in die richtige Reihenfolge</span>
        </button>
        <button class="mode-card" onclick="startMode('freewriting')">
          <span class="mode-icon">✏️</span>
          <span class="mode-name">Freies Schreiben</span>
          <span class="mode-desc">Eigene Sätze auf Englisch</span>
        </button>
      </div>
    </main>
  </div>

  <!-- ===== SCREEN 3: FLASHCARDS ===== -->
  <div id="screen-flashcards" class="screen">
    <header>
      <button class="back-btn" onclick="showScreen('mode')">← Zurück</button>
      <h1>Karteikarten</h1>
      <span id="fc-progress" class="progress-label"></span>
    </header>

    <main class="exercise-main">
      <div id="fc-card" class="flashcard" onclick="flipCard()">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <span class="card-label">Deutsch</span>
            <p id="fc-german"></p>
            <span class="flip-hint">Tippen zum Umdrehen</span>
          </div>
          <div class="flashcard-back">
            <span class="card-label">English</span>
            <p id="fc-english"></p>
          </div>
        </div>
      </div>

      <div class="fc-buttons">
        <button class="btn btn-secondary" onclick="nextCard(-1)">✗ Nochmal</button>
        <button class="btn btn-primary" onclick="nextCard(1)">✓ Gewusst</button>
      </div>
    </main>
  </div>

  <!-- ===== SCREEN 4: SENTENCES ===== -->
  <div id="screen-sentences" class="screen">
    <header>
      <button class="back-btn" onclick="showScreen('mode')">← Zurück</button>
      <h1>Sätze zusammensetzen</h1>
      <span id="sent-progress" class="progress-label"></span>
    </header>

    <main class="exercise-main">
      <p class="exercise-instruction">Tippe die Wörter in der richtigen Reihenfolge an:</p>

      <div id="sent-answer-area" class="word-area answer-area"></div>
      <div id="sent-word-pool" class="word-area word-pool"></div>

      <div id="sent-feedback" class="feedback hidden"></div>

      <div class="fc-buttons">
        <button class="btn btn-secondary" id="sent-reset-btn" onclick="resetSentence()">↺ Zurücksetzen</button>
        <button class="btn btn-primary" id="sent-check-btn" onclick="checkSentence()">Prüfen →</button>
        <button class="btn btn-primary hidden" id="sent-next-btn" onclick="nextSentence()">Weiter →</button>
      </div>
    </main>
  </div>

  <!-- ===== SCREEN 5: FREE WRITING ===== -->
  <div id="screen-freewriting" class="screen">
    <header>
      <button class="back-btn" onclick="showScreen('mode')">← Zurück</button>
      <h1>Freies Schreiben</h1>
      <span id="fw-progress" class="progress-label"></span>
    </header>

    <main class="exercise-main">
      <div class="prompt-box">
        <p id="fw-prompt"></p>
      </div>

      <textarea id="fw-input" placeholder="Schreibe hier auf Englisch..."></textarea>

      <div id="fw-example" class="example-box hidden">
        <p class="example-label">💡 Mögliche Antwort:</p>
        <p id="fw-example-text"></p>
      </div>

      <div class="fc-buttons">
        <button class="btn btn-secondary" id="fw-show-btn" onclick="showExample()">Beispiel zeigen</button>
        <button class="btn btn-primary" onclick="nextPrompt()">Weiter →</button>
      </div>
    </main>
  </div>

  <!-- ===== SCREEN 6: RESULTS ===== -->
  <div id="screen-results" class="screen">
    <header>
      <h1>WordWise</h1>
    </header>

    <main class="results-main">
      <div class="results-card">
        <div class="results-icon">🎉</div>
        <h2>Gut gemacht!</h2>
        <p id="results-message"></p>
        <div class="results-buttons">
          <button class="btn btn-primary" onclick="showScreen('mode')">Weitermachen</button>
          <button class="btn btn-secondary" onclick="showScreen('home')">Neues Thema</button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
